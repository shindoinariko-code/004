<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仮想アクセサリー紹介</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>仮想アクセサリーコレクション</h1>
        <p>あなたのアバターを彩るデジタルアクセサリー</p>
    </header>

    <section class="items">

        <div class="item">
            <img src="item1.png" alt="アクセサリー1">
            <h2>ビーズブレスレット</h2>
            <p>ビーズの一つ一つが輝きを放つオリジナルブレスレット。</p>
        </div>

        <div class="item">
            <img src="item2.png" alt="アクセサリー2">
            <h2>ホログラムネックレス</h2>
            <p>角度によって色が変わる幻想的なネックレス。</p>
        </div>

        <div class="item">
            <img src="item3.png" alt="アクセサリー3">
            <h2>サイバーリング</h2>
            <p>未来的な光を放つデジタルリング。</p>
        </div>

    </section>

    <footer>
        <p>© 2026 Virtual Accessories</p>
    </footer>

</body>
</html>
